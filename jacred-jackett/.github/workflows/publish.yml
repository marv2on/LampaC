name: Publish Docker Image

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Режим сборки"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release

permissions:
  contents: write
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: jacred

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version
        id: vars
        run: |
          if [ "${{ inputs.mode }}" == "release" ]; then
            ver=$(date +'%d-%m-%Y')
            echo "version=${ver}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=diag-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Lowercase image name
        run: |
          echo "IMAGE_LOWER=${GITHUB_REPOSITORY_OWNER,,}/${IMAGE_NAME}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_LOWER }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.version }}
            type=raw,value=latest,enable=${{ steps.vars.outputs.is_release == 'true' }}
          labels: |
            org.opencontainers.image.title=jacred
            org.opencontainers.image.description=JacRed torrent tracker aggregator
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          sbom: true
          provenance: mode=max

      - name: Create Git tag
        if: ${{ steps.vars.outputs.is_release == 'true' }}
        run: |
          ver="${{ steps.vars.outputs.version }}"
          git tag "$ver"
          git push origin "$ver"

      - name: Create GitHub Release
        if: ${{ steps.vars.outputs.is_release == 'true' }}
        uses: actions/create-release@v1
        with:
          tag_name: ${{ steps.vars.outputs.is_release == 'true' && steps.vars.outputs.version || '' }}
          release_name: ${{ steps.vars.outputs.is_release == 'true' && steps.vars.outputs.version || '' }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

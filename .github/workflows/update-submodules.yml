name: Update Embedded Repos
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
permissions:
  contents: write
  packages: write
jobs:
  update-embedded-repos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync embedded repositories
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          sync_repo() {
            local dir="$1"
            local url="$2"
            local ref="${3:-}"
            local subdir="${4:-}"
            local tmp
            if git ls-tree HEAD "$dir" | grep -q '^160000 '; then
              git rm -f "$dir"
            fi
            tmp="$(mktemp -d)"
            if [ -n "$ref" ]; then
              git clone --depth 1 --branch "$ref" "$url" "$tmp"
            else
              git clone --depth 1 "$url" "$tmp"
            fi
            rm -rf "$tmp/.git"
            mkdir -p "$dir"
            if [ -n "$subdir" ]; then
              rsync -a --delete "$tmp/$subdir"/ "$dir"/
            else
              rsync -a --delete "$tmp"/ "$dir"/
            fi
            rm -rf "$tmp"
          }
          sync_repo "Lampac"           "https://github.com/lampac-talks/lampac"
          sync_repo "lampa-source"     "https://github.com/yumata/lampa-source"
          sync_repo "lampac-ukraine"    "https://github.com/lampame/lampac-ukraine"
          sync_repo "lampac-ukraine-ng"       "https://github.com/lampame/lampac-ukraine" "lampac-ng"
          sync_repo "lampac-ukraine-graveyard" "https://github.com/lampame/lampac-ukraine" "Graveyard"
          sync_repo "Alcopac_docker"   "https://github.com/Kirill9732/Alcopac_docker"
          sync_repo "jacred"           "https://github.com/jacred-fdb/jacred"
          sync_repo "jacred-jackett"   "https://github.com/egorrrmiller/jacred"
          sync_repo "siaivo-custom"    "https://github.com/Siaivo/siaivo.github.io"  "rework" "src/custom"
          sync_repo "siaivo-main"      "https://github.com/Siaivo/siaivo.github.io"  "main"
          sync_repo "torrserver-tgbot" "https://github.com/YouROK/TorrServer"        "master" "server/tgbot"
          sync_repo "lampac-nextgen"   "https://github.com/lampac-nextgen/lampac"
          if [ -f .gitmodules ]; then
            git rm -f .gitmodules || true
          fi
          if git diff --quiet HEAD; then
            echo "No embedded repo updates found"
            exit 0
          fi
          git add .
          git commit -m "chore: sync embedded repositories"
          git push origin main

      # ── Release: lampac-talks ────────────────────────────────────────────
      - name: Sync lampac-talks release
        id: talks_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          LATEST=$(curl -sf https://api.github.com/repos/lampac-talks/lampac/releases/latest)
          VERSION=$(echo "$LATEST" | grep '"tag_name"' | cut -d'"' -f4)
          ZIP_URL=$(echo "$LATEST" | grep 'browser_download_url.*publish\.zip' | cut -d'"' -f4)
          TAG="talks-${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists, skipping."
            echo "new_release=false" >> "$GITHUB_OUTPUT"
          else
            curl -L "$ZIP_URL" -o /tmp/talks-publish.zip
            gh release create "$TAG" /tmp/talks-publish.zip \
              --title "Lampac talks $VERSION" \
              --notes "Auto-synced from lampac-talks/lampac release $VERSION"
            echo "new_release=true" >> "$GITHUB_OUTPUT"
          fi

      # ── Release: lampac-nextgen ──────────────────────────────────────────
      - name: Sync lampac-nextgen release
        id: nextgen_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          LATEST=$(curl -sf https://api.github.com/repos/lampac-nextgen/lampac/releases/latest)
          VERSION=$(echo "$LATEST" | grep '"tag_name"' | cut -d'"' -f4)
          TAG="nextgen-${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists, skipping."
            echo "new_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ASSET_URLS=$(echo "$LATEST" | grep 'browser_download_url' | cut -d'"' -f4)
          FILES=""
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            origname=$(basename "$url")
            curl -L "$url" -o "/tmp/${origname}"
            FILES="$FILES /tmp/${origname}"
          done <<< "$ASSET_URLS"
          if [ -z "$(echo "$FILES" | xargs)" ]; then
            echo "No assets found, skipping."
            echo "new_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          gh release create "$TAG" $FILES \
            --title "Lampac NextGen $VERSION" \
            --notes "Auto-synced from lampac-nextgen/lampac release $VERSION"
          echo "new_release=true" >> "$GITHUB_OUTPUT"

      # ── Release: jacred ──────────────────────────────────────────────────
      - name: Sync jacred release
        id: jacred_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          LATEST=$(curl -sf https://api.github.com/repos/jacred-fdb/jacred/releases/latest)
          VERSION=$(echo "$LATEST" | grep '"tag_name"' | cut -d'"' -f4)
          TAG="jacred-${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists, skipping."
            echo "new_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ASSET_URLS=$(echo "$LATEST" | grep 'browser_download_url' | cut -d'"' -f4)
          FILES=""
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            origname=$(basename "$url")
            curl -L "$url" -o "/tmp/${origname}"
            FILES="$FILES /tmp/${origname}"
          done <<< "$ASSET_URLS"
          if [ -z "$(echo "$FILES" | xargs)" ]; then
            echo "No assets found, skipping."
            echo "new_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          gh release create "$TAG" $FILES \
            --title "JacRed $VERSION" \
            --notes "Auto-synced from jacred-fdb/jacred release $VERSION"
          echo "new_release=true" >> "$GITHUB_OUTPUT"

      # ── Release: jacred-egorrrmiller ─────────────────────────────────────
      - name: Sync jacred-egorrrmiller release
        id: jacred_egorrrmiller_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          LATEST=$(curl -sf https://api.github.com/repos/egorrrmiller/jacred/releases/latest)
          VERSION=$(echo "$LATEST" | grep '"tag_name"' | cut -d'"' -f4)
          TAG="${VERSION}-egorrrmiller"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists, skipping."
            echo "new_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Скачиваем бинарные ассеты (если есть)
          ASSET_URLS=$(echo "$LATEST" | grep 'browser_download_url' | cut -d'"' -f4 || true)
          FILES=""
          if [ -n "$ASSET_URLS" ]; then
            while IFS= read -r url; do
              [ -z "$url" ] && continue
              origname=$(basename "$url")
              curl -L "$url" -o "/tmp/${origname}"
              FILES="$FILES /tmp/${origname}"
            done <<< "$ASSET_URLS"
          fi
          FILES=$(echo "$FILES" | xargs || true)
          if [ -n "$FILES" ]; then
            gh release create "$TAG" $FILES \
              --title "JacRed egorrrmiller $VERSION" \
              --notes "Auto-synced from egorrrmiller/jacred release $VERSION"
          else
            # Релиз без бинарных ассетов — создаём без файлов
            gh release create "$TAG" \
              --title "JacRed egorrrmiller $VERSION" \
              --notes "Auto-synced from egorrrmiller/jacred release $VERSION"
          fi
          echo "new_release=true" >> "$GITHUB_OUTPUT"

      # ── Docker ───────────────────────────────────────────────────────────
      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # Mirror lampac-talks
      - name: Check lampac-talks Docker image
        id: talks_check
        run: |
          set -euo pipefail
          UPSTREAM=$(docker buildx imagetools inspect \
            "ghcr.io/lampac-talks/lampac:${{ steps.talks_release.outputs.version }}-amd64-finality" \
            --format '{{json .Manifest.Digest}}' 2>/dev/null | tr -d '"' || echo "")
          OUR=$(docker buildx imagetools inspect ghcr.io/marv2on/lampac-talks:latest \
            --format '{{json .Manifest.Digest}}' 2>/dev/null | tr -d '"' || echo "")
          echo "upstream: $UPSTREAM"
          echo "ours:     $OUR"
          if [ -n "$UPSTREAM" ] && [ "$UPSTREAM" != "$OUR" ]; then
            echo "needs_mirror=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_mirror=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Mirror lampac-talks Docker image (merge amd64+arm64)
        if: steps.talks_check.outputs.needs_mirror == 'true'
        run: |
          VERSION="${{ steps.talks_release.outputs.version }}"
          docker buildx imagetools create \
            --tag ghcr.io/marv2on/lampac-talks:latest \
            --tag ghcr.io/marv2on/lampac-talks:${VERSION} \
            "ghcr.io/lampac-talks/lampac:${VERSION}-amd64-finality" \
            "ghcr.io/lampac-talks/lampac:${VERSION}-arm64-finality"
          echo "Mirror done → ghcr.io/marv2on/lampac-talks:latest"

      # Mirror lampac-nextgen
      - name: Check lampac-nextgen Docker image
        id: nextgen_check
        run: |
          set -euo pipefail
          UPSTREAM=$(docker buildx imagetools inspect ghcr.io/lampac-nextgen/lampac:latest \
            --format '{{json .Manifest.Digest}}' 2>/dev/null | tr -d '"' || echo "")
          OUR=$(docker buildx imagetools inspect ghcr.io/marv2on/lampac-nextgen:latest \
            --format '{{json .Manifest.Digest}}' 2>/dev/null | tr -d '"' || echo "")
          if [ -n "$UPSTREAM" ] && [ "$UPSTREAM" != "$OUR" ]; then
            echo "needs_mirror=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_mirror=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Mirror lampac-nextgen Docker image
        if: steps.nextgen_check.outputs.needs_mirror == 'true'
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/marv2on/lampac-nextgen:latest \
            ghcr.io/lampac-nextgen/lampac:latest
          echo "Mirror done → ghcr.io/marv2on/lampac-nextgen:latest"

      # Mirror jacred
      - name: Check jacred Docker image
        id: jacred_check
        run: |
          set -euo pipefail
          UPSTREAM=$(docker buildx imagetools inspect ghcr.io/jacred-fdb/jacred:latest \
            --format '{{json .Manifest.Digest}}' 2>/dev/null | tr -d '"' || echo "")
          OUR=$(docker buildx imagetools inspect ghcr.io/marv2on/jacred:latest \
            --format '{{json .Manifest.Digest}}' 2>/dev/null | tr -d '"' || echo "")
          echo "upstream: $UPSTREAM"
          echo "ours:     $OUR"
          if [ -n "$UPSTREAM" ] && [ "$UPSTREAM" != "$OUR" ]; then
            echo "needs_mirror=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_mirror=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Mirror jacred Docker image
        if: steps.jacred_check.outputs.needs_mirror == 'true'
        run: |
          VERSION="${{ steps.jacred_release.outputs.version }}"
          docker buildx imagetools create \
            --tag ghcr.io/marv2on/jacred:latest \
            --tag ghcr.io/marv2on/jacred:${VERSION} \
            ghcr.io/jacred-fdb/jacred:latest
          echo "Mirror done → ghcr.io/marv2on/jacred:latest"

      # Mirror jacred-egorrrmiller
      - name: Check jacred-egorrrmiller Docker image
        id: jacred_egorrrmiller_check
        run: |
          set -euo pipefail
          UPSTREAM=$(docker buildx imagetools inspect ghcr.io/egorrrmiller/jacred:latest \
            --format '{{json .Manifest.Digest}}' 2>/dev/null | tr -d '"' || echo "")
          OUR=$(docker buildx imagetools inspect ghcr.io/marv2on/jacred-egorrrmiller:latest \
            --format '{{json .Manifest.Digest}}' 2>/dev/null | tr -d '"' || echo "")
          echo "upstream: $UPSTREAM"
          echo "ours:     $OUR"
          if [ -n "$UPSTREAM" ] && [ "$UPSTREAM" != "$OUR" ]; then
            echo "needs_mirror=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_mirror=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Mirror jacred-egorrrmiller Docker image
        if: steps.jacred_egorrrmiller_check.outputs.needs_mirror == 'true'
        run: |
          VERSION="${{ steps.jacred_egorrrmiller_release.outputs.version }}"
          docker buildx imagetools create \
            --tag ghcr.io/marv2on/jacred-egorrrmiller:latest \
            --tag ghcr.io/marv2on/jacred-egorrrmiller:${VERSION} \
            ghcr.io/egorrrmiller/jacred:latest
          echo "Mirror done → ghcr.io/marv2on/jacred-egorrrmiller:latest"

---
name: Reusable Upload Release Assets

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag name (e.g. 1.0.0 or v1.0.0). Must match existing GitHub Release."
        type: string
        required: true

      artifact_pattern:
        description: "Pattern to match artifacts for download (e.g. lampac-nextgen)"
        type: string
        required: false
        default: "lampac-nextgen"

jobs:
  upload-release-assets:
    name: Attach artifacts to release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifact (zip, no extract)
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: ${{ inputs.artifact_pattern }}
          path: release-files
          skip-decompress: true

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          working_directory: release-files
          files: "*.zip"
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

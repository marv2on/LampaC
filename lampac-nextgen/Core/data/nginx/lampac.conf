server { 
# Рекомендуется заменить listen.ip any на "listen":{"ip": "127.0.0.1"} в init.conf
   listen 80;
   server_name lampac.lc;
   charset off;
   access_log off;
   
   map $http_connection $connection_upgrade {
      "~*Upgrade" $http_connection;
      default keep-alive;
   }
   
   location ~* ^/nws$ {
      proxy_pass http://127.0.0.1:9118;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
	  
      # Configuration for WebSockets
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_cache off;

      # Configuration for ServerSentEvents
      proxy_buffering off;

      # WebSocket.inactiveAfterMinutes 120m
      proxy_read_timeout 2h;
   }
   
   location ~* ^/proxy {
      proxy_pass  http://127.0.0.1:9118;
	  proxy_http_version 1.1;
	  proxy_set_header Connection "";
	  proxy_redirect off;

      proxy_set_header 	Host 			  $host;
      proxy_set_header	X-Forwarded-For	  $proxy_add_x_forwarded_for;
      proxy_set_header	X-Forwarded-Proto $scheme;
      
	  proxy_buffering off;
	  proxy_max_temp_file_size 0;

	  proxy_headers_hash_max_size 512;
	  proxy_headers_hash_bucket_size 128;
	  
	  proxy_connect_timeout	20;
	  proxy_send_timeout	30;
	  proxy_read_timeout	30;
   }
   
   location / {
      proxy_pass  http://127.0.0.1:9118;
	  
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_redirect off;

      proxy_set_header	Host 			  $host;
      proxy_set_header	X-Forwarded-For	  $proxy_add_x_forwarded_for;
      proxy_set_header	X-Forwarded-Proto $scheme;

      # --- буферизация запроса клиента ---
      proxy_request_buffering on;
      client_max_body_size 	  10m;
      client_body_buffer_size 512k;

      # --- буферизация ответа ASP.NET ---
      proxy_buffering on;
      proxy_buffer_size 128k;
      proxy_buffers 4 128k;
      proxy_busy_buffers_size 256k;

      # --- таймауты ---
      proxy_connect_timeout 20;
      proxy_send_timeout 	30;
      proxy_read_timeout 	30;

      proxy_headers_hash_max_size 512;
      proxy_headers_hash_bucket_size 128;
   }
}
